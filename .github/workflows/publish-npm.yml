name: Publish npm

on:
  push:
    tags:
      - "v*-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.0.1-install)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install

      - name: Parse release tag
        id: release
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          JSON="$(node scripts/parse-release-tag.mjs "$RELEASE_TAG")"
          echo "$JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_OUTPUT"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build compiler
        run: pnpm --filter @skills-house/build build

      - name: Build @skills-house/build
        if: steps.release.outputs.type == 'build'
        run: pnpm --filter @skills-house/build build

      - name: Build @skills-house/install
        if: steps.release.outputs.type == 'install'
        run: pnpm --filter @skills-house/install build

      - name: Build @skills-house/create
        if: steps.release.outputs.type == 'create'
        run: |
          pnpm --filter @skills-house/build build
          pnpm --filter @skills-house/install build
          pnpm --filter @skills-house/create build
          node scripts/sync-create-template.mjs

      - name: Build skill
        if: steps.release.outputs.type == 'skill'
        run: node internal-scripts/build/dist/cli.js "skills/${{ steps.release.outputs.skill }}"

      - name: Set @skills-house/build version from tag
        if: steps.release.outputs.type == 'build'
        run: |
          node -e "
            const fs = require('node:fs');
            const path = 'internal-scripts/build/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            pkg.version = '${{ steps.release.outputs.version }}';
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Pack and publish @skills-house/build
        if: steps.release.outputs.type == 'build'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm pack:build
          cd packages/publish/build
          npm publish --access public

      - name: Set @skills-house/install version from tag
        if: steps.release.outputs.type == 'install'
        run: |
          node -e "
            const fs = require('node:fs');
            const path = 'internal-scripts/install/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            pkg.version = '${{ steps.release.outputs.version }}';
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Pack and publish @skills-house/install
        if: steps.release.outputs.type == 'install'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm pack:install
          cd packages/publish/install
          npm publish --access public

      - name: Set @skills-house/create version from tag
        if: steps.release.outputs.type == 'create'
        run: |
          node -e "
            const fs = require('node:fs');
            const path = 'internal-scripts/create/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            pkg.version = '${{ steps.release.outputs.version }}';
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Pack and publish @skills-house/create
        if: steps.release.outputs.type == 'create'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm pack:create
          cd packages/publish/create
          npm publish --access public

      - name: Pack and publish skill
        if: steps.release.outputs.type == 'skill'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm pack:skill ${{ steps.release.outputs.skill }} --version ${{ steps.release.outputs.version }}
          cd packages/publish/skill-${{ steps.release.outputs.skill }}
          npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.tag }}
