name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build compiler
        run: pnpm --filter @skills-house/build build

      - name: Build CLI
        run: pnpm --filter @skills-house/cli build

      - name: Build skills
        run: |
          for skill in skills/*/; do
            node internal-scripts/build/dist/cli.js "$skill"
          done

      - name: Test
        run: pnpm test

      - name: Pack skill-auditor (smoke)
        run: node scripts/pack-skill.mjs skill-auditor

      - name: Pack CLI (smoke)
        run: node scripts/pack-cli.mjs

      - name: Validate skill-auditor
        run: bash scripts/skill-auditor-tools/scripts/validate.sh skills/skill-auditor
