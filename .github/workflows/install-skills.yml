name: Install project skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'skills-dist/**'
      - 'scripts/**'
      - 'internal-scripts/**'
      - '.github/workflows/install-skills.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build compiler
        run: pnpm --filter @skills-house/build build

      - name: Relink workspace bins
        run: pnpm install

      - name: Build skills
        run: pnpm --filter "./skills/*" build

      - name: Install project skills
        run: pnpm install:skills --scope project --copy

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: sync project-installed skills'
          file_pattern: '.agents/skills/**'
