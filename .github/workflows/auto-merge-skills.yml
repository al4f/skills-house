name: Auto-merge Skill Contributions

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  detect-skill-contribution:
    runs-on: ubuntu-latest
    outputs:
      is_skill_pr: ${{ steps.detect.outputs.is_skill_pr }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        name: Detect skill-only contribution
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          mapfile -t files < <(git diff --name-only "$BASE" "$HEAD")
          if [ "${#files[@]}" -eq 0 ]; then
            echo "is_skill_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          skill_dirs=""
          for file in "${files[@]}"; do
            case "$file" in
              skills/*/*)
                dir="${file#skills/}"
                dir="${dir%%/*}"
                skill_dirs+="$dir "
                ;;
              skills-dist/*/*)
                dir="${file#skills-dist/}"
                dir="${dir%%/*}"
                skill_dirs+="$dir "
                ;;
              generated/*|website/data/*|website/skills/*|website/platform/*|website/platform.css)
                continue
                ;;
              *)
                echo "Platform file changed: $file"
                echo "is_skill_pr=false" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
            esac
          done
          unique_dirs=$(echo "$skill_dirs" | tr ' ' '\n' | sed '/^$/d' | sort -u)
          count=$(echo "$unique_dirs" | sed '/^$/d' | wc -l)
          if [ "$count" -eq 1 ]; then
            echo "Skill-only PR for: $unique_dirs"
            echo "is_skill_pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "Multiple or no skill directories in PR"
            echo "is_skill_pr=false" >> "$GITHUB_OUTPUT"
          fi

  auto-merge:
    needs: detect-skill-contribution
    if: needs.detect-skill-contribution.outputs.is_skill_pr == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for required checks
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20
          running-workflow-name: auto-merge
          allowed-conclusions: success

      - name: Approve pull request
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" --auto --squash --delete-branch
