name: Skill request
description: Propose a new skill for the skills-house catalog
title: "[skill]: "
labels: ["skill"]
body:
  - type: input
    id: skill-name
    attributes:
      label: Proposed skill name
      placeholder: my-skill-name
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: When should an agent load this skill?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What should the skill do? Keep it focused.
    validations:
      required: true
